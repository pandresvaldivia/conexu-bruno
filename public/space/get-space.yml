info:
  name: get-space
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphql_url}}"
  body:
    query: |-
      query {
        space(id: "0541b339-3899-4867-a9c2-e4f4fd2b5e02") {
          id
          name
          slug
          sport
          sportType
          floorType
          maxCapacity
          lighting
          roofing
          changingRoom
          parking
          stands
          airConditioner
          wifi
          enabled
          transformable
          depositType
          cancellationPolicy
          allowedDurations
          createdAt
          updatedAt
        }
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
