info:
  name: get-location-list
  type: graphql
  seq: 1

graphql:
  method: POST
  url: "{{graphql_url}}"
  body:
    query: |-
      query {
        locations(offset: 0, limit: 12) {
      		totalCount
          pageInfo {
            hasNextPage
            hasPreviousPage
          }
      		locations {
            	id
              name
              address
          }
        }
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
